<style>
/* ---------- GLOBAL STIL ---------- */
body {
  font-family: Arial, sans-serif;
  background: #4991b7;
  margin: 0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

/* ---------- CONTAINER ---------- */
.container {
  max-width: 520px;
  width: 95%;
  padding: 25px 36px;
  margin: 20px auto;
  background: #d3f4f7;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* ---------- RUBRIKER ---------- */
h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px;
}

/* ---------- FRÅGOR ---------- */
.question {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
  gap: 8px;
  text-align: center;
}

/* Frågetext */
.topic {
  font-weight: bold;
  font-size: 21px; /* något mindre än tidigare 24px */
}

/* ---------- INPUT ---------- */
input {
  padding: 10px;
  width: 180px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 18px; /* lite mindre än tidigare */
  text-align: center;
}

/* ---------- KNAPPAR ---------- */
button {
  padding: 10px 16px;
  border: none;
  background: #146a97;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px; /* något mindre */
  font-weight: bold;
}

button:hover {
  background: #2e4b5a;
}

/* ---------- RESULTAT ---------- */
.result {
  min-height: 20px;
  text-align: center;
  padding: 5px;
  border-radius: 4px;
}

.correct {
  color: green;
  font-weight: bold;
  background: #d4edda;
}

.wrong {
  color: red;
  font-weight: bold;
  background: #f8d7da;
}

/* ---------- KNAPPGRUPP ---------- */
.buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* ---------- TABS ---------- */
.tabs {
  position: fixed;
  top: 0;
  width: 100%;
  background: #146a97;
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  z-index: 100;
  flex-wrap: wrap;
}

.tabs button {
  background: #146a97;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-size: 19px;
}

.tabs button:hover {
  background: #2e4b5a;
}

.tabs button.active {
  background: #2e4b5a;
  color: white;
}

.tabcontent {
  margin-top: 70px;
}

/* ---------- MEDIA QUERY FÖR MOBILER ---------- */
@media (max-width: 600px) {
  .container {
    width: 95%;
    padding: 20px;
  }

  h1 {
    font-size: 22px;
  }

  .topic {
    font-size: 20px; /* något mindre för mobil */
  }

  input {
    width: 100%;
    font-size: 16px;
    padding: 10px;
  }

  button {
    font-size: 16px;
    padding: 10px 14px;
  }

  .buttons {
    flex-direction: column;
    gap: 10px;
  }

  .tabs button {
    flex: 1 1 45%;
    font-size: 14px;
    padding: 8px 12px;
  }
}
</style>

// ---------- NORMALISERA SVAR ----------
function normalize(v){
  return v.replace(/\s/g,"").replace(",",".").trim()
}

// ---------- KONTROLLERA SVAR ----------
function checkAnswer(prefix,index){
  let questionList = quizzes[prefix]
  let user = normalize(document.getElementById(prefix+"_input"+index).value)
  let result = document.getElementById(prefix+"_result"+index)
  let showBtn = document.getElementById(prefix+"_show"+index)
  let correctAnswers = questionList[index].answers.map(normalize)

  if(correctAnswers.includes(user)){
    result.innerHTML="✓ Rätt!"
    result.className="result correct"
    showBtn.style.display="none"
  }else{
    result.innerHTML="✗ Fel"
    result.className="result wrong"
    showBtn.style.display="inline-block"
  }
}

// ---------- VISA SVAR ----------
function showAnswer(prefix,index){
  let q = quizzes[prefix][index]
  let result = document.getElementById(prefix+"_result"+index)
  let correct = q.answers.join(" eller ")
  let explanation = q.explanation ? " "+q.explanation : ""
  result.innerHTML = `Rätt svar: ${correct}${explanation}`
  result.className = "result"
}

// ---------- ENTER FUNKTION ----------
function handleKey(prefix,event,index){
  if(event.key==="Enter"){
    checkAnswer(prefix,index)
    let next=document.getElementById(prefix+"_input"+(index+1))
    if(next){ next.focus() }
  }
}

// ---------- FLIKAR ----------
function showTab(tab,btn){
  document.getElementById("quiz1").style.display="none"
  document.getElementById("quiz2").style.display="none"
  document.getElementById("quiz3").style.display="none"
  document.getElementById("quiz4").style.display="none"
  document.getElementById(tab).style.display="block"

  let tabs=document.querySelectorAll(".tabs button")
  tabs.forEach(t=>t.classList.remove("active"))
  btn.classList.add("active")
}

// ---------- BYGG QUIZ ----------
function createQuiz(questionList, containerId, prefix, breaks=[]){
  let container = document.getElementById(containerId)
  questionList.forEach((q,index)=>{
    let div = document.createElement("div")
    div.className="question"

    div.innerHTML = `
      <label class="topic" for="${prefix}_input${index}">${q.topic}</label>
      <input 
        id="${prefix}_input${index}" 
        placeholder="Skriv nummer"
        onkeypress="handleKey('${prefix}',event,${index})"
      >
      <div class="buttons">
        <button onclick="checkAnswer('${prefix}',${index})">Kontrollera</button>
        <button id="${prefix}_show${index}" onclick="showAnswer('${prefix}',${index})" style="display:none;">Visa rätt svar</button>
      </div>
      <div id="${prefix}_result${index}" class="result"></div>
    `

    container.appendChild(div)

    if(breaks.includes(index)){
      let hr=document.createElement("hr")
      hr.style.margin="30px 0"
      hr.style.border="2px solid #ccc"
      container.appendChild(hr)
    }
  })
}
